x-app_environment: &app_environment
  environment:
    # Common
    BITRIX_PORT: ${BITRIX_PORT}
    CYPHER_PORT: ${CYPHER_PORT}
    DEBUG: ${DEBUG}


services:
  cypher:
    restart: unless-stopped
    ports:
      - "${CYPHER_PORT}:8000"
    volumes:
      - ./cypher/logs:/app/logs
    build:
      context: .
      dockerfile: cypher/Dockerfile
    command: uvicorn main:app --host 0.0.0.0
    <<: *app_environment
  
  bitrix:
    restart: unless-stopped
    ports:
      - "${BITRIX_PORT}:8000"
    volumes:
      - ./bitrix/logs:/app/logs
    build:
      context: ./bitrix
    command: uvicorn main:app --host 0.0.0.0
    <<: *app_environment
    depends_on:
      - cypher