x-app_environment: &app_environment
  environment:
    # Common
    DEBUG: ${DEBUG}
    # Bitrix
    BITRIX_PORT: ${BITRIX_PORT}
    # Cypher
    CYPHER_PORT: ${CYPHER_PORT}
    STUNNEL_WORK: ${STUNNEL_WORK}
    STUNNEL_TEST: ${STUNNEL_TEST}


services:
  cypher:
    restart: unless-stopped
    ports:
      - "${CYPHER_PORT}:8000"
      - "${STUNNEL_WORK}:1500"
      - "${STUNNEL_TEST}:1501"
    volumes:
      - ./cypher/logs:/app/logs
    build:
      context: .
      dockerfile: cypher/Dockerfile
    command: ["/start.sh"]
    <<: *app_environment
  
  bitrix:
    restart: unless-stopped
    ports:
      - "${BITRIX_PORT}:8000"
    volumes:
      - ./bitrix/logs:/app/logs
    build:
      context: ./bitrix
    command: uvicorn main:app --host 0.0.0.0
    <<: *app_environment
    depends_on:
      - cypher